kind = "web"
previewPath = "/"
title = "Manuela Missions NGO Website"
version = "1.0.0"
id = "artifacts/manuela-missions"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24138

[services.development]
run = "pnpm --filter @workspace/manuela-missions run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/manuela-missions", "run", "build" ]
publicDir = "artifacts/manuela-missions/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24138"
BASE_PATH = "/"
